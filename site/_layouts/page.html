---
layout: default
---
<article class="page">
  <header class="page-header">
    {%- if page.section_label and page.section != 'home' -%}
      <p class="eyebrow">{{ page.section_label }}</p>
    {%- endif -%}
    <h1 class="page-title">{{ page.title }}</h1>
    {%- if page.subtitle -%}
      <p class="page-subtitle">{{ page.subtitle }}</p>
    {%- endif -%}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
